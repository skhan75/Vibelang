      - uses: sigstore/cosign-installer@v3
      - name: verify package checksum, signatures, and provenance
        run: |
          set -euo pipefail
          package="/tmp/v1-signed/vibe-x86_64-unknown-linux-gnu.tar.gz"
          checksums="/tmp/v1-signed/checksums-x86_64-unknown-linux-gnu.txt"
          test -f "${package}"
          test -f "${checksums}"
          package_name="$(basename "${package}")"
          expected="$(awk -v pkg="${package_name}" '$2 == pkg {print $1}' "${checksums}")"
          if [ -z "${expected}" ]; then
            echo "missing checksum entry for ${package_name}"
            exit 1
          fi
          actual="$(sha256sum "${package}" | awk '{print $1}')"
          if [ "${expected}" != "${actual}" ]; then
            echo "checksum mismatch for ${package_name}"
            echo "expected: ${expected}"
            echo "actual:   ${actual}"
            exit 1
          fi
          cosign verify-blob \
            --certificate-identity-regexp ".*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --signature "${package}.sig" \
            --certificate "${package}.pem" \
            "${package}"
          cosign verify-blob \
            --certificate-identity-regexp ".*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --signature "${package}.provenance.json.sig" \
            --certificate "${package}.provenance.json.pem" \
            "${package}.provenance.json"
          python3 - "${package}" "${package}.provenance.json" <<'PY'
          import hashlib
          import json
          import pathlib
          import sys

          artifact = pathlib.Path(sys.argv[1])
          provenance = pathlib.Path(sys.argv[2])

          h = hashlib.sha256()
          with artifact.open("rb") as f:
              for chunk in iter(lambda: f.read(1024 * 1024), b""):
                  h.update(chunk)
          digest = h.hexdigest()

          statement = json.loads(provenance.read_text(encoding="utf-8"))
          subject = statement["subject"][0]
          if subject["digest"]["sha256"] != digest:
              raise SystemExit("provenance digest does not match package digest")
          PY
      - name: install packaged vibe and run hello world
        run: |
          set -euo pipefail
          package="/tmp/v1-signed/vibe-x86_64-unknown-linux-gnu.tar.gz"
          install_root="/tmp/vibe-install-linux-latest"
          rm -rf "${install_root}"
          mkdir -p "${install_root}"
          tar -xzf "${package}" -C "${install_root}"
          vibe_bin="$(echo "${install_root}"/vibe-*/bin/vibe)"
          test -x "${vibe_bin}"
          "${vibe_bin}" --version
          cat > "${install_root}/hello.yb" <<'EOF'
          pub main() -> Int {
            @effect io
            println("hello from packaged vibe")
            0
          }
          EOF
          out="$("${vibe_bin}" run "${install_root}/hello.yb")"
          test "${out}" = "hello from packaged vibe"

  install_smoke_macos:
    name: install-smoke-macos
    runs-on: macos-latest
    needs: sign_attest_and_sbom
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: v1-packaged-signed-bundle
          path: /tmp/v1-signed
      - uses: sigstore/cosign-installer@v3
      - name: verify package checksum, signatures, and provenance
        run: |
          set -euo pipefail
          package="/tmp/v1-signed/vibe-x86_64-apple-darwin.tar.gz"
          checksums="/tmp/v1-signed/checksums-x86_64-apple-darwin.txt"
          test -f "${package}"
          test -f "${checksums}"
          package_name="$(basename "${package}")"
          expected="$(awk -v pkg="${package_name}" '$2 == pkg {print $1}' "${checksums}")"
          if [ -z "${expected}" ]; then
            echo "missing checksum entry for ${package_name}"
            exit 1
          fi
          actual="$(shasum -a 256 "${package}" | awk '{print $1}')"
          if [ "${expected}" != "${actual}" ]; then
            echo "checksum mismatch for ${package_name}"
            echo "expected: ${expected}"
            echo "actual:   ${actual}"
            exit 1
          fi
          cosign verify-blob \
            --certificate-identity-regexp ".*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --signature "${package}.sig" \
            --certificate "${package}.pem" \
            "${package}"
          cosign verify-blob \
            --certificate-identity-regexp ".*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --signature "${package}.provenance.json.sig" \
            --certificate "${package}.provenance.json.pem" \
            "${package}.provenance.json"
          python3 - "${package}" "${package}.provenance.json" <<'PY'
          import hashlib
          import json
          import pathlib
          import sys

          artifact = pathlib.Path(sys.argv[1])
          provenance = pathlib.Path(sys.argv[2])
          h = hashlib.sha256()
          with artifact.open("rb") as f:
              for chunk in iter(lambda: f.read(1024 * 1024), b""):
                  h.update(chunk)
          digest = h.hexdigest()
          statement = json.loads(provenance.read_text(encoding="utf-8"))
          subject = statement["subject"][0]
          if subject["digest"]["sha256"] != digest:
              raise SystemExit("provenance digest does not match package digest")
          PY
      - name: install packaged vibe and run hello world
        run: |
          set -euo pipefail
          package="/tmp/v1-signed/vibe-x86_64-apple-darwin.tar.gz"
          install_root="/tmp/vibe-install-macos"
          rm -rf "${install_root}"
          mkdir -p "${install_root}"
          tar -xzf "${package}" -C "${install_root}"
          vibe_bin="$(echo "${install_root}"/vibe-*/bin/vibe)"
          test -x "${vibe_bin}"
          "${vibe_bin}" --version
          cat > "${install_root}/hello.yb" <<'EOF'
          pub main() -> Int {
            @effect io
            println("hello from packaged vibe")
            0
          }
          EOF
          out="$("${vibe_bin}" run "${install_root}/hello.yb")"
          test "${out}" = "hello from packaged vibe"

  install_smoke_windows:
    name: install-smoke-windows
    runs-on: windows-latest
    needs: sign_attest_and_sbom
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: v1-packaged-signed-bundle
          path: C:\v1-signed
      - uses: sigstore/cosign-installer@v3
      - uses: ilammy/msvc-dev-cmd@v1
      - name: verify package checksum, signatures, and provenance
        shell: pwsh
        run: |
          $package = "C:\v1-signed\vibe-x86_64-pc-windows-msvc.zip"
          $checksums = "C:\v1-signed\checksums-x86_64-pc-windows-msvc.txt"
          if (!(Test-Path $package)) { throw "missing package $package" }
          if (!(Test-Path $checksums)) { throw "missing checksums $checksums" }

          $pkgName = Split-Path $package -Leaf
          $escapedPkg = [regex]::Escape($pkgName)
          $entry = Select-String -Path $checksums -Pattern "^(?<hash>[0-9a-fA-F]{64})\s+$escapedPkg$" | Select-Object -First 1
          if ($null -eq $entry) { throw "missing checksum line for $pkgName" }
          $expected = $entry.Matches[0].Groups["hash"].Value.ToLower()
          $actual = (Get-FileHash -Algorithm SHA256 $package).Hash.ToLower()
          if ($expected -ne $actual) { throw "checksum mismatch for $pkgName" }

          cosign verify-blob --certificate-identity-regexp ".*" --certificate-oidc-issuer "https://token.actions.githubusercontent.com" --signature "$package.sig" --certificate "$package.pem" "$package"
          cosign verify-blob --certificate-identity-regexp ".*" --certificate-oidc-issuer "https://token.actions.githubusercontent.com" --signature "$package.provenance.json.sig" --certificate "$package.provenance.json.pem" "$package.provenance.json"

          $prov = Get-Content "$package.provenance.json" -Raw | ConvertFrom-Json
          $provDigest = $prov.subject[0].digest.sha256.ToLower()
          if ($provDigest -ne $actual) { throw "provenance digest does not match package digest" }
      - name: install packaged vibe and run hello world
        shell: pwsh
        run: |
          $package = "C:\v1-signed\vibe-x86_64-pc-windows-msvc.zip"
          $installRoot = "C:\vibe-install-windows"
          if (Test-Path $installRoot) { Remove-Item -Recurse -Force $installRoot }
          New-Item -ItemType Directory -Path $installRoot | Out-Null
          Expand-Archive -Path $package -DestinationPath $installRoot -Force

          $vibe = Get-ChildItem -Path $installRoot -Recurse -Filter vibe.exe | Select-Object -First 1
          if ($null -eq $vibe) { throw "vibe.exe not found after extraction" }
          & $vibe.FullName --version

          $hello = Join-Path $installRoot "hello.yb"
          @"
          pub main() -> Int {
            @effect io
            println("hello from packaged vibe")
            0
          }
          "@ | Set-Content -Path $hello -Encoding utf8

          $output = (& $vibe.FullName run $hello | Out-String).Trim()
          if ($output -ne "hello from packaged vibe") {
            throw "unexpected hello output: $output"
          }
