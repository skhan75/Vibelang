name: phase13-editor-ux

on:
  push:
    branches: ["main", "release/**"]
    paths:
      - ".github/workflows/phase13-editor-ux.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - "compiler/**"
      - "runtime/**"
      - "tooling/phase13/**"
      - "tooling/metrics/**"
      - "editor-support/**"
      - "reports/phase13/**"
  pull_request:
    branches: ["main", "release/**"]
    paths:
      - ".github/workflows/phase13-editor-ux.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - "compiler/**"
      - "runtime/**"
      - "tooling/phase13/**"
      - "tooling/metrics/**"
      - "editor-support/**"
      - "reports/phase13/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  grammar_and_language_assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: validate textmate grammar and language assets
        run: |
          set -euo pipefail
          python3 tooling/phase13/validate_textmate_grammar.py

  lsp_jsonrpc_protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: run vibe_lsp unit coverage
        run: |
          set -euo pipefail
          cargo test -p vibe_lsp
      - name: run jsonrpc protocol smoke
        run: |
          set -euo pipefail
          python3 tooling/phase13/protocol_smoke.py

  vscode_cursor_extension_smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: build and smoke extension package
        working-directory: editor-support/vscode
        run: |
          set -euo pipefail
          npm install
          npm run build
          npm run smoke
          npm run validate:grammar

  benchmarks_and_ci_parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: collect and enforce editor ux benchmark budgets
        run: |
          set -euo pipefail
          python3 tooling/phase13/benchmark_editor_ux.py --enforce
      - name: verify editor and cli diagnostics parity
        run: |
          set -euo pipefail
          python3 tooling/phase13/check_diagnostics_parity.py
      - name: validate quality budgets including editor ux metrics
        run: |
          set -euo pipefail
          VIBE_REQUIRE_EDITOR_UX_METRICS=1 python3 tooling/metrics/validate_v1_quality_budgets.py
      - uses: actions/upload-artifact@v4
        with:
          name: phase13-editor-ux-reports
          path: reports/phase13
          retention-days: 3

