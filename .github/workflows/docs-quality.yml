name: docs-quality

on:
  push:
    branches: ["main", "release/**"]
    paths:
      - ".github/workflows/docs-quality.yml"
      - "book/**"
      - "docs/**"
      - "tooling/docs/**"
      - "reports/docs/**"
  pull_request:
    branches: ["main", "release/**"]
    paths:
      - ".github/workflows/docs-quality.yml"
      - "book/**"
      - "docs/**"
      - "tooling/docs/**"
      - "reports/docs/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs_quality_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: run docs quality checks
        run: |
          set -euo pipefail
          python3 tooling/docs/validate_snippets.py
          python3 tooling/docs/link_check.py
          python3 tooling/docs/spell_check.py
          python3 tooling/docs/stale_example_check.py
          python3 tooling/docs/compute_docs_coverage.py
          python3 tooling/docs/generate_documentation_quality_report.py
      - uses: actions/upload-artifact@v4
        with:
          name: docs-quality-artifacts
          path: reports/docs/
          retention-days: 3
