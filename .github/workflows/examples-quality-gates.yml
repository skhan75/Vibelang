name: examples-quality-gates

on:
  push:
    branches: ["main", "release/**"]
    paths:
      - ".github/workflows/examples-quality-gates.yml"
      - "examples/**"
      - "crates/**"
      - "compiler/**"
      - "runtime/**"
      - "tooling/metrics/examples_parity_ci.py"
      - "docs/checklists/features_and_optimizations.md"
  pull_request:
    branches: ["main", "release/**"]
    paths:
      - ".github/workflows/examples-quality-gates.yml"
      - "examples/**"
      - "crates/**"
      - "compiler/**"
      - "runtime/**"
      - "tooling/metrics/examples_parity_ci.py"
      - "docs/checklists/features_and_optimizations.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  examples_parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: run examples parity checks
        run: |
          set -euo pipefail
          python3 tooling/metrics/examples_parity_ci.py
      - name: upload examples parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: examples-parity-report
          path: |
            reports/examples/parity_ci_latest.json
            reports/examples/parity_ci_latest.md
