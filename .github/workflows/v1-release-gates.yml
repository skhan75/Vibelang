name: v1-release-gates

on:
  push:
    branches: ["main", "release/**"]
  pull_request:
    branches: ["main", "release/**"]
  workflow_dispatch:

jobs:
  determinism_and_core_smokes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: deterministic build + frontend determinism
        run: |
          set -euo pipefail
          cargo test -p vibe_cli --test phase2_native deterministic_build_binary_and_metadata
          cargo test -p vibe_cli --test frontend_fixtures phase7_basic_and_intermediate_matrix
          cargo test -p vibe_cli --test frontend_fixtures phase7_frontend_outputs_are_deterministic

  runtime_and_concurrency_smokes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: runtime and concurrency bounded stress
        run: |
          set -euo pipefail
          cargo test -p vibe_cli --test phase7_concurrency phase7_concurrency_samples_are_deterministic_and_bounded
          cargo test -p vibe_runtime scheduler_bounded_soak_stability
          cargo test -p vibe_runtime channel_contention_close_stress

  intent_validation_smokes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: intent verifier-gate smoke
        run: |
          set -euo pipefail
          cargo test -p vibe_cli --test phase7_intent_validation intent_lint_verifier_gate_rejects_invalid_suggestions

  packaging_integrity_smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: build release binary and emit checksum
        run: |
          set -euo pipefail
          cargo build --release -p vibe_cli
          sha256sum target/release/vibe > /tmp/vibe.sha256
          test -s /tmp/vibe.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: v1-release-checksums
          path: /tmp/vibe.sha256

  metrics_threshold_smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: collect and validate metrics thresholds
        run: |
          set -euo pipefail
          python3 tooling/metrics/collect_phase6_metrics.py
          python3 tooling/metrics/validate_phase6_metrics.py

  quality_and_coverage_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: validate coverage policy and v1 quality budgets
        run: |
          set -euo pipefail
          python3 tooling/metrics/validate_phase7_coverage_matrix.py
          python3 tooling/metrics/validate_v1_quality_budgets.py
      - name: run v1 tightening smoke suite
        run: |
          set -euo pipefail
          cargo test -p vibe_cli --test phase7_v1_tightening

  cli_ux_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: run CLI help/version regression tests
        run: |
          set -euo pipefail
          cargo test -p vibe_cli --test cli_help_snapshots
          cargo test -p vibe_cli --test cli_version
      - name: verify CLI UX docs exist
        run: |
          set -euo pipefail
          test -f docs/cli/help_manual.md
          test -f docs/cli/version_output.md

  independent_install_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: build packaged candidate binary
        run: |
          set -euo pipefail
          cargo build --release -p vibe_cli
      - name: simulate no-cargo install path and run hello
        run: |
          set -euo pipefail
          bundle_root="/tmp/v1_independent_install_bundle"
          install_root="/tmp/v1_independent_install"
          rm -rf "${bundle_root}" "${install_root}"
          mkdir -p "${bundle_root}/vibe-x86_64-unknown-linux-gnu/bin"
          cp target/release/vibe "${bundle_root}/vibe-x86_64-unknown-linux-gnu/bin/vibe"
          tar -czf /tmp/vibe-x86_64-unknown-linux-gnu.tar.gz -C "${bundle_root}" "vibe-x86_64-unknown-linux-gnu"
          mkdir -p "${install_root}"
          tar -xzf /tmp/vibe-x86_64-unknown-linux-gnu.tar.gz -C "${install_root}"
          vibe_bin="${install_root}/vibe-x86_64-unknown-linux-gnu/bin/vibe"
          test -x "${vibe_bin}"
          "${vibe_bin}" --version
          cat > /tmp/v1_independent_install_hello.yb <<'EOF'
          pub main() -> Int {
            @effect io
            println("hello from independent install gate")
            0
          }
          EOF
          out="$("${vibe_bin}" run /tmp/v1_independent_install_hello.yb)"
          test "${out}" = "hello from independent install gate"
      - name: verify packaged release workflow and install docs are present
        run: |
          set -euo pipefail
          test -f .github/workflows/v1-packaged-release.yml
          test -f docs/release/distribution_matrix.md
          test -f docs/release/distribution_security.md
          test -f docs/release/offline_install_policy.md
          test -f docs/policy/install_channels_v1.md
          test -f docs/install/linux.md
          test -f docs/install/macos.md
          test -f docs/install/windows.md
          test -f docs/install/verification.md
          test -f docs/install/update_and_rollback.md
          test -f docs/install/troubleshooting.md

  dynamic_containers_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: run dynamic container frontend coverage
        run: |
          set -euo pipefail
          cargo test -p vibe_cli --test frontend_fixtures parse_err_golden
          cargo test -p vibe_cli --test frontend_fixtures type_ok_fixtures
          cargo test -p vibe_cli --test frontend_fixtures type_err_golden
          cargo test -p vibe_cli --test frontend_fixtures ownership_err_golden
          cargo test -p vibe_cli --test frontend_fixtures snapshots_container_ops_mir_is_deterministic
      - name: run dynamic container runtime conformance smokes
        run: |
          set -euo pipefail
          cargo test -p vibe_cli --test phase7_v1_tightening phase7_algorithmic_recursion_samples_run_expected_outputs
          cargo test -p vibe_cli --test phase7_v1_tightening phase7_memory_heap_pressure_smoke_is_bounded
          cargo test -p vibe_cli --test phase7_v1_tightening phase7_ownership_sendability_smokes_cover_positive_and_negative_paths
      - uses: actions/upload-artifact@v4
        with:
          name: v1-dynamic-containers-conformance
          path: reports/v1/dynamic_containers_conformance.md

  spec_integrity_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: lint spec markdown
        run: |
          set -euo pipefail
          npx --yes markdownlint-cli@latest docs/spec/*.md --disable MD013
      - name: verify local markdown links in spec docs
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re
          import sys
          from pathlib import Path

          root = Path(".").resolve()
          spec_dir = root / "docs" / "spec"
          pattern = re.compile(r"\[[^\]]+\]\(([^)]+)\)")
          missing = []

          for md in sorted(spec_dir.glob("*.md")):
              text = md.read_text()
              for match in pattern.finditer(text):
                  raw = match.group(1).strip()
                  if not raw:
                      continue
                  target = raw.split()[0].strip("<>")
                  if target.startswith(("http://", "https://", "mailto:", "#")):
                      continue
                  target = target.split("#", 1)[0]
                  if not target:
                      continue
                  path = (md.parent / target).resolve()
                  if not path.exists():
                      missing.append(f"{md.relative_to(root)} -> {target}")

          if missing:
              print("spec local link check failed:")
              for item in missing:
                  print(f"  - {item}")
              sys.exit(1)
          print("spec local link check passed")
          PY
      - name: run spec consistency and coverage validators
        run: |
          set -euo pipefail
          python3 tooling/spec/validate_spec_consistency.py
          python3 tooling/spec/validate_spec_coverage.py

  compatibility_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: run adjacent-version and lock-mode compatibility path
        run: |
          set -euo pipefail
          cargo test -p vibe_cli --test phase2_native vibe_test_directory_accepts_mixed_extensions_when_stems_differ
          cargo test -p vibe_cli --test phase2_native vibe_test_rejects_same_stem_across_extensions
          cargo test -p vibe_cli --test phase2_native build_locked_requires_lockfile_when_manifest_exists

  selfhost_readiness_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: run selfhost formatter parity and determinism tests
        run: |
          set -euo pipefail
          cargo test -p vibe_fmt --test selfhost_conformance
      - name: run selfhost formatter via vibe test bridge
        run: |
          set -euo pipefail
          cargo run -q -p vibe_cli -- test selfhost/formatter_core.yb
      - name: run M3 shadow diagnostics ordering parity checks
        run: |
          set -euo pipefail
          cargo test -p vibe_diagnostics --test selfhost_shadow_ordering
          cargo run -q -p vibe_cli -- test selfhost/diagnostics_ordering_shadow.yb
      - uses: actions/upload-artifact@v4
        with:
          name: v1-selfhost-readiness
          path: |
            reports/v1/selfhost_readiness.md
            reports/v1/selfhost_readiness.json
            docs/selfhost/m1_formatter_contract.md
            selfhost/diagnostics_ordering_shadow.yb

  readiness_docs_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: verify operational readiness docs exist
        run: |
          set -euo pipefail
          test -f docs/release/v1_scope_freeze.md
          test -f docs/release/v1_release_gates.md
          test -f docs/release/release_blocker_policy.md
          test -f docs/release/rc_process.md
          test -f docs/release/rollback_playbook.md
          test -f docs/release/known_limitations_gate.md
          test -f docs/support/issue_triage_sla.md
          test -f docs/privacy/telemetry_statement.md
          test -f docs/testing/coverage_policy.md
          test -f docs/selfhost/m1_formatter_contract.md
          test -f docs/spec/README.md
          test -f docs/spec/grammar_v1_0.ebnf
          test -f docs/spec/spec_coverage_matrix.md
          test -f docs/release/distribution_matrix.md
          test -f docs/release/distribution_security.md
          test -f docs/release/offline_install_policy.md
          test -f docs/policy/install_channels_v1.md
          test -f docs/cli/help_manual.md
          test -f docs/cli/version_output.md
          test -f docs/install/linux.md
          test -f docs/install/macos.md
          test -f docs/install/windows.md
          test -f docs/install/verification.md
          test -f docs/install/update_and_rollback.md
          test -f docs/install/troubleshooting.md

  reports_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: verify v1 reports exist
        run: |
          set -euo pipefail
          test -f reports/v1/readiness_dashboard.md
          test -f reports/v1/release_candidate_checklist.md
          test -f reports/v1/selfhost_readiness.md
          test -f reports/v1/selfhost_readiness.json
          test -f reports/v1/spec_readiness.md
          test -f reports/v1/dynamic_containers_conformance.md
          test -f reports/v1/install_independence.md
          test -f reports/v1/distribution_readiness.md
          test -f reports/v1/phase8_ci_evidence.md
          test -f reports/v1/phase8_closeout_summary.md

  release_pr_report_links_gate:
    if: ${{ github.event_name == 'pull_request' && startsWith(github.head_ref, 'release/') }}
    runs-on: ubuntu-latest
    steps:
      - name: enforce required v1 report links in release PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          echo "$PR_BODY" | grep -q "reports/v1/readiness_dashboard.md"
          echo "$PR_BODY" | grep -q "reports/v1/release_candidate_checklist.md"
          echo "$PR_BODY" | grep -q "reports/v1/dynamic_containers_conformance.md"
          echo "$PR_BODY" | grep -q "reports/v1/install_independence.md"
          echo "$PR_BODY" | grep -q "reports/v1/distribution_readiness.md"
          echo "$PR_BODY" | grep -q "reports/v1/phase8_ci_evidence.md"
          echo "$PR_BODY" | grep -q "reports/v1/phase8_closeout_summary.md"

  summary:
    runs-on: ubuntu-latest
    needs:
      - determinism_and_core_smokes
      - runtime_and_concurrency_smokes
      - intent_validation_smokes
      - packaging_integrity_smoke
      - metrics_threshold_smoke
      - quality_and_coverage_gate
      - cli_ux_gate
      - independent_install_gate
      - dynamic_containers_gate
      - spec_integrity_gate
      - compatibility_gate
      - selfhost_readiness_gate
      - readiness_docs_gate
      - reports_gate
    steps:
      - name: v1 gates summary
        run: echo "v1 release gates passed"
