name: phase6-metrics

on:
  push:
    branches: ["main", "release/**"]
    paths:
      - ".github/workflows/phase6-metrics.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - "tooling/metrics/**"
      - "tooling/phase14/**"
      - "docs/testing/**"
      - "reports/phase6/**"
      - "reports/phase14/**"
  pull_request:
    branches: ["main", "release/**"]
    paths:
      - ".github/workflows/phase6-metrics.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - "tooling/metrics/**"
      - "tooling/phase14/**"
      - "docs/testing/**"
      - "reports/phase6/**"
      - "reports/phase14/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  collect_and_validate_metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: collect phase6 metrics
        run: |
          set -euo pipefail
          python3 tooling/metrics/collect_phase6_metrics.py
      - name: validate phase6 metrics thresholds
        run: |
          set -euo pipefail
          python3 tooling/metrics/validate_phase6_metrics.py
      - uses: actions/upload-artifact@v4
        with:
          name: phase6-metrics
          path: reports/phase6/metrics/
          retention-days: 3
