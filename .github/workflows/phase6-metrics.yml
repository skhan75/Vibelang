name: phase6-metrics

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  collect_and_validate_metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: collect phase6 metrics
        run: |
          set -euo pipefail
          python3 tooling/metrics/collect_phase6_metrics.py
      - name: validate phase6 metrics thresholds
        run: |
          set -euo pipefail
          python3 tooling/metrics/validate_phase6_metrics.py
      - uses: actions/upload-artifact@v4
        with:
          name: phase6-metrics
          path: reports/phase6/metrics/
