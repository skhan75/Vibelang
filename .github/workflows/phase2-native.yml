name: phase2-native

on:
  push:
    branches: ["main", "release/**"]
    paths:
      - ".github/workflows/phase2-native.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - "compiler/**"
      - "runtime/**"
      - "tooling/**"
  pull_request:
    branches: ["main", "release/**"]
    paths:
      - ".github/workflows/phase2-native.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - "compiler/**"
      - "runtime/**"
      - "tooling/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: backend and cli tests
        run: |
          set -euo pipefail
          cargo test -p vibe_hir
          cargo test -p vibe_mir
          cargo test -p vibe_codegen
          cargo test -p vibe_cli --tests

  hello_world_smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build hello-world fixture
        run: |
          set -euo pipefail
          for ext in vibe yb; do
            tmpdir="$(mktemp -d)"
            file="$tmpdir/hello_world.$ext"
            cp compiler/tests/fixtures/build/hello_world.vibe "$file"
            cargo run -q -p vibe_cli -- build "$file"
          done
      - name: run hello-world fixture
        run: |
          set -euo pipefail
          for ext in vibe yb; do
            tmpdir="$(mktemp -d)"
            file="$tmpdir/hello_world.$ext"
            cp compiler/tests/fixtures/build/hello_world.vibe "$file"
            cargo run -q -p vibe_cli -- run "$file" > "/tmp/hello.$ext.out"
            printf "hello from vibelang\n" > /tmp/hello.expected
            diff -u /tmp/hello.expected "/tmp/hello.$ext.out"
          done

  deterministic_build_smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: deterministic native build output
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          file="$tmpdir/hello_world.yb"
          cp compiler/tests/fixtures/build/hello_world.vibe "$file"
          bin="$tmpdir/.yb/artifacts/dev/x86_64-unknown-linux-gnu/hello_world"

          cargo run -q -p vibe_cli -- build "$file" > /tmp/build_1.txt
          sha256sum "$bin" > /tmp/hash_1.txt

          cargo run -q -p vibe_cli -- build "$file" > /tmp/build_2.txt
          sha256sum "$bin" > /tmp/hash_2.txt

          diff -u /tmp/build_1.txt /tmp/build_2.txt
          diff -u /tmp/hash_1.txt /tmp/hash_2.txt
