name: phase5-ai-sidecar

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  sidecar_and_lint_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: run sidecar and lint test suites
        run: |
          set -euo pipefail
          cargo test -p vibe_sidecar
          cargo test -p vibe_cli --test phase5_intent_lint

  non_blocking_compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: compile parity with sidecar knobs
        run: |
          set -euo pipefail
          for ext in vibe yb; do
            tmpdir="$(mktemp -d)"
            file="$tmpdir/hello_world.$ext"
            cp compiler/tests/fixtures/build/hello_world.vibe "$file"
            cargo run -q -p vibe_cli -- build "$file" > "/tmp/build_off.$ext.out" 2> "/tmp/build_off.$ext.err"
            VIBE_SIDECAR_MODE=cloud VIBE_SIDECAR_TELEMETRY=1 cargo run -q -p vibe_cli -- build "$file" > "/tmp/build_on.$ext.out" 2> "/tmp/build_on.$ext.err"
            diff -u "/tmp/build_off.$ext.out" "/tmp/build_on.$ext.out"
            diff -u "/tmp/build_off.$ext.err" "/tmp/build_on.$ext.err"
          done

  budget_latency_and_policy_guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: verify budget guard and telemetry output
        run: |
          set -euo pipefail
          for ext in vibe yb; do
            tmpdir="$(mktemp -d)"
            cat > "$tmpdir/sample.$ext" <<'EOF'
            pub multiply(a: Int, b: Int) -> Int {
              a * b
            }
            EOF

            cargo run -q -p vibe_cli -- lint "$tmpdir" --intent --max-requests-per-day 0 > "/tmp/lint_budget.$ext.out"
            grep -q "partial results" "/tmp/lint_budget.$ext.out"

            telemetry="$tmpdir/reports/phase5/telemetry_$ext.json"
            cargo run -q -p vibe_cli -- lint "$tmpdir" --intent --telemetry-out "$telemetry" > "/tmp/lint_telemetry.$ext.out"
            test -s "$telemetry"
            grep -q "\"requests\"" "$telemetry"
          done

  intent_lint_quality_smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: verify expected intent lint findings and verified suggestions
        run: |
          set -euo pipefail
          for ext in vibe yb; do
            tmpdir="$(mktemp -d)"
            cat > "$tmpdir/sample.$ext" <<'EOF'
            pub addOne(x: Int) -> Int {
              x + 1
            }
            EOF

            cargo run -q -p vibe_cli -- lint "$tmpdir" --intent > "/tmp/lint_quality.$ext.out"
            grep -q "I5001" "/tmp/lint_quality.$ext.out"

            cargo run -q -p vibe_cli -- lint "$tmpdir" --intent --suggest > "/tmp/lint_quality_suggest.$ext.out"
            grep -q "verified=true" "/tmp/lint_quality_suggest.$ext.out"
          done
