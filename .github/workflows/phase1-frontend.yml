name: phase1-frontend

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  fmt_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo test
        run: cargo test --workspace --all-targets

  determinism_smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: deterministic check and hir output
        run: |
          set -euo pipefail
          for ext in vibe yb; do
            file="/tmp/basic_function.$ext"
            cp compiler/tests/fixtures/parse_ok/basic_function.vibe "$file"
            cargo run -q -p vibe_cli -- check "$file" > "/tmp/check_${ext}_1.txt"
            cargo run -q -p vibe_cli -- check "$file" > "/tmp/check_${ext}_2.txt"
            diff -u "/tmp/check_${ext}_1.txt" "/tmp/check_${ext}_2.txt"
            cargo run -q -p vibe_cli -- hir "$file" > "/tmp/hir_${ext}_1.txt"
            cargo run -q -p vibe_cli -- hir "$file" > "/tmp/hir_${ext}_2.txt"
            diff -u "/tmp/hir_${ext}_1.txt" "/tmp/hir_${ext}_2.txt"
          done
