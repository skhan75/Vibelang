environments:
  - os: linux
    compiler: vibe
    version: stable
    include: vibelang
    build: vibe build app.yb --profile release && cp .yb/artifacts/release/x86_64-unknown-linux-gnu/app out/app && cp run_vibelang.sh out/run_vibelang.sh && chmod +x out/run_vibelang.sh
    out_dir: out
    run_cmd: run_vibelang.sh
    warmup: true
