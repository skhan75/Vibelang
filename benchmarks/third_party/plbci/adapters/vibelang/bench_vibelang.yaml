lang: vibelang
problems:
  - name: helloworld
    source:
      - 1.yb
  - name: nsieve
    source:
      - 1.yb
  - name: coro-prime-sieve
    source:
      - 1.yb
compiler_version_command: vibe --version
runtime_version_parameter:
source_rename_to: app.yb
environments:
  - os: linux
    compiler: vibe
    version: stable
    build: vibe build app.yb --profile release && cp .yb/artifacts/release/x86_64-unknown-linux-gnu/main out/app
    out_dir: out
    run_cmd: app
    warmup: true
